<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>메가와리 프로모션 관리 대시보드</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/fullcalendar/6.1.10/index.global.min.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/fullcalendar/6.1.10/index.global.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Space+Mono:wght@400;700&display=swap');
  :root {
    --bg-primary:#0d0f1a; --bg-card:#151827; --bg-card2:#1c2035;
    --accent:#ff6b35; --accent2:#f7c59f; --teal:#00d4aa;
    --blue:#4a90d9; --purple:#9b59b6; --green:#2ecc71;
    --border:rgba(255,255,255,0.07); --text-primary:#eef0f8; --text-muted:#7a849e;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Noto Sans KR',sans-serif;background:var(--bg-primary);color:var(--text-primary);min-height:100vh}
  ::-webkit-scrollbar{width:5px;height:5px}
  ::-webkit-scrollbar-track{background:var(--bg-primary)}
  ::-webkit-scrollbar-thumb{background:#333;border-radius:3px}

  /* Header */
  .header{background:linear-gradient(135deg,#0d0f1a,#151827);border-bottom:1px solid var(--border);padding:0 2rem;height:64px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
  .logo{font-family:'Space Mono',monospace;font-size:1.1rem;font-weight:700;letter-spacing:.05em;color:var(--accent)}
  .logo span{color:var(--text-muted);font-weight:400}
  .season-wrap{display:flex;align-items:center;gap:.75rem}
  .season-label{font-size:.75rem;color:var(--text-muted);letter-spacing:.1em;text-transform:uppercase;font-family:'Space Mono',monospace}
  .season-select{background:var(--bg-card2);border:1px solid var(--border);color:var(--text-primary);padding:.4rem .9rem;border-radius:6px;font-size:.85rem;font-family:'Noto Sans KR',sans-serif;cursor:pointer;outline:none;min-width:130px;transition:border-color .2s}
  .season-select:focus{border-color:var(--accent)}
  .season-select option{background:#1c2035}



  /* Tabs */
  .tab-nav{display:flex;padding:0 2rem;background:var(--bg-card);border-bottom:1px solid var(--border)}
  .tab-btn{background:transparent;border:none;color:var(--text-muted);padding:.9rem 1.5rem;font-size:.85rem;font-family:'Noto Sans KR',sans-serif;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;letter-spacing:.03em}
  .tab-btn:hover{color:var(--text-primary)}
  .tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}

  /* Layout */
  .main{padding:1.5rem 2rem;max-width:1600px;margin:0 auto}
  .tab-panel{display:none}
  .tab-panel.active{display:block}
  .card{background:var(--bg-card);border:1px solid var(--border);border-radius:10px;overflow:hidden}
  .card-header{padding:1rem 1.25rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem}
  .card-title{font-size:.85rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--text-muted);font-family:'Space Mono',monospace}

  /* Buttons */
  .btn{border:none;border-radius:6px;font-family:'Noto Sans KR',sans-serif;font-size:.82rem;font-weight:500;cursor:pointer;padding:.45rem 1rem;transition:all .2s}
  .btn-primary{background:var(--accent);color:#fff}
  .btn-primary:hover{background:#ff5420}
  .btn-secondary{background:var(--bg-card2);color:var(--text-primary);border:1px solid var(--border)}
  .btn-secondary:hover{border-color:var(--accent);color:var(--accent)}
  .btn-danger{background:rgba(231,76,60,.15);color:#e74c3c;border:1px solid rgba(231,76,60,.3)}
  .btn-danger:hover{background:rgba(231,76,60,.25)}
  .btn-sm{padding:.3rem .7rem;font-size:.78rem}
  .btn-ghost{background:transparent;color:var(--text-muted);border:1px dashed var(--border)}
  .btn-ghost:hover{border-color:var(--teal);color:var(--teal)}

  /* Table */
  .table-wrap{overflow-x:auto}
  table{width:100%;border-collapse:collapse;font-size:.83rem}
  thead tr{background:var(--bg-card2)}
  th{padding:.75rem 1rem;text-align:left;font-size:.72rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted);font-family:'Space Mono',monospace;white-space:nowrap}
  td{padding:.75rem 1rem;border-bottom:1px solid var(--border);color:var(--text-primary);vertical-align:top}
  tbody tr:hover{background:rgba(255,255,255,.02)}
  tbody tr:last-child td{border-bottom:none}

  /* Badge */
  .badge{display:inline-block;padding:.2rem .55rem;border-radius:4px;font-size:.72rem;font-weight:600;letter-spacing:.05em}
  .badge-internal{background:rgba(74,144,217,.2);color:var(--blue)}
  .badge-external{background:rgba(155,89,182,.2);color:var(--purple)}
  .badge-promo{background:rgba(46,204,113,.2);color:var(--green)}
  .badge-teal{background:rgba(0,212,170,.15);color:var(--teal)}
  .badge-accent{background:rgba(255,107,53,.15);color:var(--accent)}

  /* Modal */
  .modal-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:1000;align-items:center;justify-content:center;padding:1rem}
  .modal-backdrop.open{display:flex}
  .modal{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;width:100%;max-width:640px;max-height:92vh;overflow-y:auto;animation:modalIn .2s ease}
  @keyframes modalIn{from{transform:translateY(-18px);opacity:0}to{transform:translateY(0);opacity:1}}
  .modal-header{padding:1.25rem 1.5rem 1rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--bg-card);z-index:10}
  .modal-title{font-size:1rem;font-weight:700}
  .modal-close{background:none;border:none;color:var(--text-muted);font-size:1.4rem;cursor:pointer;line-height:1}
  .modal-close:hover{color:var(--text-primary)}
  .modal-body{padding:1.25rem 1.5rem}
  .modal-footer{padding:1rem 1.5rem;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:.75rem;position:sticky;bottom:0;background:var(--bg-card)}

  /* Form */
  .form-group{margin-bottom:1rem}
  .form-label{display:block;font-size:.78rem;font-weight:600;color:var(--text-muted);margin-bottom:.4rem;letter-spacing:.05em;text-transform:uppercase;font-family:'Space Mono',monospace}
  .form-control{width:100%;background:var(--bg-card2);border:1px solid var(--border);color:var(--text-primary);padding:.55rem .85rem;border-radius:6px;font-size:.85rem;font-family:'Noto Sans KR',sans-serif;outline:none;transition:border-color .2s}
  .form-control:focus{border-color:var(--accent)}
  .form-control::placeholder{color:var(--text-muted)}
  select.form-control{cursor:pointer}
  select.form-control option{background:#1c2035}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}

  /* Product code filter bar */
  .filter-bar{display:flex;align-items:center;gap:.5rem;flex-wrap:wrap}
  .filter-chip{display:inline-flex;align-items:center;gap:.3rem;background:var(--bg-card2);border:1px solid var(--border);border-radius:20px;padding:.22rem .75rem;font-size:.78rem;cursor:pointer;transition:all .15s;user-select:none;white-space:nowrap}
  .filter-chip:hover{border-color:var(--accent2);color:var(--accent2)}
  .filter-chip.active{background:rgba(255,107,53,.15);border-color:var(--accent);color:var(--accent)}
  .filter-chip-all{border-style:dashed}

  /* Product checkboxes */
  .product-checkboxes{background:var(--bg-card2);border:1px solid var(--border);border-radius:6px;padding:.5rem;max-height:155px;overflow-y:auto;display:flex;flex-wrap:wrap;gap:.3rem}
  .product-checkboxes label{display:flex;align-items:center;gap:.35rem;background:var(--bg-card);border:1px solid var(--border);border-radius:4px;padding:.25rem .6rem;font-size:.78rem;cursor:pointer;transition:border-color .15s;user-select:none}
  .product-checkboxes label:hover{border-color:var(--accent2)}
  .product-checkboxes input[type="checkbox"]{accent-color:var(--accent)}
  .product-checkboxes input[type="checkbox"]:checked+span{color:var(--accent2)}

  /* Option Builder */
  .option-builder{display:flex;flex-direction:column;gap:.65rem}
  .option-block{background:var(--bg-card2);border:1px solid var(--border);border-radius:8px;overflow:hidden}
  .option-block-header{display:flex;align-items:center;gap:.5rem;padding:.55rem .75rem;background:rgba(255,255,255,.03);border-bottom:1px solid var(--border)}
  .option-name-input{flex:1;background:transparent;border:none;border-bottom:1px solid rgba(255,255,255,.12);color:var(--text-primary);font-size:.85rem;font-family:'Noto Sans KR',sans-serif;padding:.15rem .3rem;outline:none;font-weight:600}
  .option-name-input:focus{border-bottom-color:var(--accent)}
  .option-name-input::placeholder{color:var(--text-muted);font-weight:400}
  .btn-icon{background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:.95rem;line-height:1;padding:.2rem .3rem;border-radius:3px;transition:color .15s;flex-shrink:0}
  .btn-icon:hover{color:#e74c3c}
  .option-items{padding:.45rem .75rem;display:flex;flex-direction:column;gap:.35rem}
  .option-item{display:flex;align-items:center;gap:.4rem}
  .option-item-val{flex:2;background:var(--bg-card);border:1px solid var(--border);color:var(--text-primary);font-size:.82rem;font-family:'Noto Sans KR',sans-serif;padding:.32rem .6rem;border-radius:4px;outline:none;transition:border-color .2s;min-width:0}
  .option-item-val:focus{border-color:var(--accent)}
  .option-item-val::placeholder{color:var(--text-muted)}
  .option-item-code{flex:1;background:var(--bg-card);border:1px solid var(--border);color:var(--text-muted);font-size:.78rem;font-family:'Space Mono',monospace;padding:.32rem .55rem;border-radius:4px;outline:none;transition:border-color .2s;min-width:0}
  .option-item-code:focus{border-color:var(--blue);color:var(--text-primary)}
  .option-item-code::placeholder{color:rgba(122,132,158,.45)}
  .btn-add-item{display:flex;align-items:center;gap:.3rem;background:none;border:1px dashed rgba(255,255,255,.1);border-radius:4px;color:var(--text-muted);font-size:.77rem;font-family:'Noto Sans KR',sans-serif;cursor:pointer;padding:.28rem .6rem;margin:.3rem 0;transition:all .15s}
  .btn-add-item:hover{border-color:var(--teal);color:var(--teal)}

  /* Inline Option Display */
  .opt-group{margin-bottom:.4rem}
  .opt-group:last-child{margin-bottom:0}
  .opt-group-name{font-size:.68rem;font-weight:700;color:var(--text-muted);letter-spacing:.07em;text-transform:uppercase;font-family:'Space Mono',monospace;margin-bottom:.18rem}
  .opt-items-row{display:flex;flex-wrap:wrap;gap:.2rem}
  .opt-chip{display:inline-flex;align-items:center;gap:.25rem;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:4px;padding:.12rem .4rem;font-size:.75rem;color:var(--text-primary);white-space:nowrap}
  .opt-chip-code{font-family:'Space Mono',monospace;font-size:.67rem;color:var(--blue);background:rgba(74,144,217,.12);border-radius:2px;padding:.03rem .28rem}

  /* Calendar */
  .fc{font-family:'Noto Sans KR',sans-serif !important;font-size:.82rem}
  .fc .fc-toolbar-title{font-size:1rem !important;font-weight:700;font-family:'Space Mono',monospace;color:var(--text-primary) !important}
  .fc .fc-button{background:var(--bg-card2) !important;border:1px solid var(--border) !important;color:var(--text-primary) !important;font-size:.78rem !important;padding:.35rem .8rem !important;border-radius:5px !important;transition:border-color .2s !important;box-shadow:none !important}
  .fc .fc-button:hover{border-color:var(--accent) !important;color:var(--accent) !important}
  .fc .fc-button-primary:not(:disabled).fc-button-active{background:var(--accent) !important;border-color:var(--accent) !important;color:#fff !important}
  .fc .fc-col-header-cell{background:var(--bg-card2)}
  .fc .fc-col-header-cell-cushion{color:var(--text-muted) !important;font-size:.72rem;letter-spacing:.06em;text-transform:uppercase;font-family:'Space Mono',monospace}
  .fc .fc-daygrid-day:hover{background:rgba(255,255,255,.02)}
  .fc .fc-day-today{background:rgba(255,107,53,.06) !important}
  .fc-theme-standard td,.fc-theme-standard th{border-color:var(--border) !important}
  .fc-theme-standard .fc-scrollgrid{border-color:var(--border) !important}
  .fc .fc-daygrid-day-number{color:var(--text-muted) !important;font-size:.75rem}
  .fc .fc-day-today .fc-daygrid-day-number{color:var(--accent) !important;font-weight:700}

  /* 이벤트 바 스타일 */
  .fc .fc-event{border-radius:3px !important;border:none !important;font-size:.72rem !important;cursor:pointer;margin-bottom:2px !important}
  .fc .fc-event .fc-event-main{padding:2px 6px !important;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500;line-height:1.5}
  .fc .fc-daygrid-event-harness{margin-bottom:1px !important}

  /* 셀 높이 — 이벤트가 많아도 셀이 자동 확장 */
  .fc .fc-daygrid-day-frame{min-height:90px !important}
  .fc .fc-daygrid-body-natural .fc-daygrid-day-events{padding-bottom:4px}

  /* +N more 링크 */
  .fc .fc-more-link{color:var(--accent) !important;font-size:.72rem;font-weight:600;padding:1px 4px}
  .fc .fc-more-link:hover{text-decoration:underline}

  /* 팝오버 (more 클릭 시) */
  .fc .fc-popover{background:var(--bg-card2) !important;border:1px solid var(--border) !important;border-radius:8px !important;box-shadow:0 8px 24px rgba(0,0,0,.5) !important}
  .fc .fc-popover-header{background:var(--bg-card) !important;color:var(--text-primary) !important;font-size:.78rem !important;border-radius:8px 8px 0 0 !important;padding:.5rem .75rem !important}
  .fc .fc-popover-body{padding:.5rem .4rem !important}
  .fc .fc-popover-close{color:var(--text-muted) !important}

  /* Toast / Loading */
  #toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--bg-card2);border:1px solid var(--border);border-left:3px solid var(--teal);color:var(--text-primary);padding:.75rem 1.25rem;border-radius:8px;font-size:.83rem;z-index:9999;transform:translateX(200%);transition:transform .3s ease;max-width:340px}
  #toast.show{transform:translateX(0)}
  #toast.error{border-left-color:var(--accent)}
  .loading-overlay{display:none;position:fixed;inset:0;background:rgba(13,15,26,.8);z-index:2000;align-items:center;justify-content:center;flex-direction:column;gap:1rem}
  .loading-overlay.show{display:flex}
  .spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .empty-state{padding:3rem;text-align:center;color:var(--text-muted);font-size:.85rem}
  .empty-state .icon{font-size:2.5rem;margin-bottom:.75rem}
  .stat-chips{display:flex;gap:.75rem;margin-bottom:1.25rem;flex-wrap:wrap}
  .stat-chip{background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:.65rem 1.1rem;min-width:120px}
  .stat-chip-val{font-size:1.5rem;font-weight:900;font-family:'Space Mono',monospace;color:var(--accent);line-height:1}
  .stat-chip-label{font-size:.72rem;color:var(--text-muted);margin-top:.2rem;letter-spacing:.05em}
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div id="loadingMsg" style="font-size:.85rem;color:var(--text-primary);font-weight:500">데이터를 불러오는 중...</div>
  <div id="loadingSubMsg" style="font-size:.75rem;color:var(--text-muted);margin-top:.15rem">잠시만 기다려주세요</div>
  <div style="margin-top:1rem;width:200px;height:3px;background:rgba(255,255,255,.07);border-radius:2px;overflow:hidden">
    <div id="loadingBar" style="height:100%;width:0%;background:var(--accent);border-radius:2px;transition:width .4s ease"></div>
  </div>
</div>
<div id="toast"></div>

<!-- HEADER -->
<header class="header">
  <div class="logo">MEGAWARI<span> / Dashboard</span></div>
  <div class="season-wrap">
    <a href="https://docs.google.com/spreadsheets/d/1foSZUJrStCpAQLLT2DRnLhYT3I5rM4ecS-I3Jg6m_6g/edit?gid=1103082757#gid=1103082757"
       target="_blank"
       style="display:inline-flex;align-items:center;gap:.4rem;background:rgba(0,212,170,.1);border:1px solid rgba(0,212,170,.3);color:var(--teal);padding:.35rem .85rem;border-radius:6px;font-size:.78rem;font-weight:600;text-decoration:none;transition:all .2s;white-space:nowrap"
       onmouseover="this.style.background='rgba(0,212,170,.2)'"
       onmouseout="this.style.background='rgba(0,212,170,.1)'">
      <span>📊</span> 엑셀DB 확인하기
    </a>
    <span class="season-label">회차 선택</span>
    <select class="season-select" id="seasonSelect"><option value="">전체</option></select>
    <button class="btn btn-secondary btn-sm" onclick="refreshData()">↺ 새로고침</button>
  </div>
</header>



<!-- TABS -->
<nav class="tab-nav">
  <button class="tab-btn active" onclick="switchTab('products',this)">📦 상품코드 관리</button>
  <button class="tab-btn" onclick="switchTab('calendar',this)">📅 프로모션 캘린더</button>
</nav>

<main class="main">

  <!-- ── TAB 1: 상품코드 관리 ── -->
  <div class="tab-panel active" id="tab-products">
    <div class="stat-chips">
      <div class="stat-chip"><div class="stat-chip-val" id="statProductCount">0</div><div class="stat-chip-label">전체 상품</div></div>
      <div class="stat-chip"><div class="stat-chip-val" id="statSeasonCount">0</div><div class="stat-chip-label">회차 수</div></div>
    </div>

    <div class="card">
      <!-- 카드 헤더: 제목 + 상품코드 필터 + 등록 버튼 -->
      <div class="card-header">
        <span class="card-title">상품 목록</span>
        <!-- 상품코드 필터 칩 -->
        <div class="filter-bar" id="productCodeFilter">
          <span class="filter-chip filter-chip-all active" data-code="" onclick="setCodeFilter(this)">전체</span>
        </div>
        <button class="btn btn-primary btn-sm" onclick="openProductModal()">+ 신규 등록</button>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>회차</th>
              <th>상품코드 / 상품명</th>
              <th>옵션 상세</th>
              <th>등록일</th>
              <th>관리</th>
            </tr>
          </thead>
          <tbody id="productTbody">
            <tr><td colspan="5"><div class="empty-state"><div class="icon">📋</div>GAS URL을 연결하면 데이터를 불러옵니다</div></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- ── TAB 2: 프로모션 캘린더 ── -->
  <div class="tab-panel" id="tab-calendar">
    <div class="stat-chips">
      <div class="stat-chip"><div class="stat-chip-val" id="statPromoCount">0</div><div class="stat-chip-label">전체</div></div>
      <div class="stat-chip"><div class="stat-chip-val" id="statInternalCount">0</div><div class="stat-chip-label">내부광고</div></div>
      <div class="stat-chip"><div class="stat-chip-val" id="statExternalCount">0</div><div class="stat-chip-label">외부광고</div></div>
      <div class="stat-chip"><div class="stat-chip-val" id="statPromoOnlyCount">0</div><div class="stat-chip-label">프로모션</div></div>
    </div>
    <div class="card">
      <div class="card-header">
        <div style="display:flex;align-items:center;gap:1rem">
          <span class="card-title">프로모션 캘린더</span>
          <div style="display:flex;gap:.75rem;font-size:.72rem;color:var(--text-muted)">
            <span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:#4a90d9;margin-right:4px;vertical-align:middle"></span>내부광고</span>
            <span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:#9b59b6;margin-right:4px;vertical-align:middle"></span>외부광고</span>
            <span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:#2ecc71;margin-right:4px;vertical-align:middle"></span>프로모션</span>
          </div>
        </div>
        <button class="btn btn-primary btn-sm" onclick="openPromoModal()">+ 일정 등록</button>
      </div>
      <div style="padding:1.25rem"><div id="calendar"></div></div>
    </div>
  </div>
</main>

<!-- ════ PRODUCT MODAL ════ -->
<div class="modal-backdrop" id="productModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="productModalTitle">신규 상품 등록</span>
      <button class="modal-close" onclick="closeModal('productModal')">×</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="productId">

<script>
// ══════════════════════════════════════════
// STATE
// ══════════════════════════════════════════
const GAS_URL = 'https://script.google.com/macros/s/AKfycbzAcuaGWxEyEJRCW1_GIv641U89V_Mo1S5r7O6V17jPS0m21sdOkzlbsTiVwO08Uws0/exec';
let allProducts = [];      // 전체 (회차 필터 적용)
let activeCodeFilter = ''; // 현재 선택된 상품코드 필터
let promotions = [];
let indexData = { seasons: [], productCodes: [] };
let calendar = null;
let selectedPromoForDetail = null;
let optBlockSeq = 0;

// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  // GAS 콜드스타트 단축: 페이지 로드 즉시 워밍업 핑 전송
  fetch(GAS_URL + '?action=ping').catch(() => {});

  loadAll();
  initCalendar();
  document.getElementById('seasonSelect').addEventListener('change', () => {
    activeCodeFilter = ''; loadProducts(); loadPromotions();
  });
  document.getElementById('productCode').addEventListener('change', function () {
    const found = indexData.productCodes.find(p => p.code === this.value);
    if (found) document.getElementById('productName').value = found.name;
  });
});



// ══════════════════════════════════════════
// API
// ══════════════════════════════════════════
async function apiGet(params) {
  const url = new URL(GAS_URL);
  Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
  try { return await (await fetch(url.toString())).json(); }
  catch (e) { showToast('서버 연결 오류: ' + e.message, true); return null; }
}
async function apiPost(body) {
  try {
    return await (await fetch(GAS_URL, {
      method:'POST', headers:{'Content-Type':'text/plain'}, body:JSON.stringify(body)
    })).json();
  } catch (e) { showToast('서버 연결 오류: ' + e.message, true); return null; }
}

// ══════════════════════════════════════════
// LOAD
// ══════════════════════════════════════════

// 로딩 진행 상태 메시지
const LOAD_MSGS = [
  { pct: 10, msg: '서버 연결 중...', sub: 'GAS 서버를 깨우는 중입니다' },
  { pct: 35, msg: '기준 데이터 로딩 중...', sub: '회차 및 상품코드 목록' },
  { pct: 65, msg: '상품 정보 불러오는 중...', sub: '등록된 상품 및 옵션 데이터' },
  { pct: 85, msg: '프로모션 일정 불러오는 중...', sub: '캘린더 이벤트 준비' },
  { pct: 100, msg: '완료!', sub: '잠시만 기다려주세요' },
];

function setLoadProgress(pct) {
  const bar = document.getElementById('loadingBar');
  if (bar) bar.style.width = pct + '%';
}
function setLoadMsg(pct) {
  const step = LOAD_MSGS.slice().reverse().find(m => pct >= m.pct - 30) || LOAD_MSGS[0];
  const m = document.getElementById('loadingMsg');
  const s = document.getElementById('loadingSubMsg');
  if (m) m.textContent = step.msg;
  if (s) s.textContent = step.sub;
}

async function loadAll() {
  showLoading(true);
  setLoadProgress(10); setLoadMsg(10);
  try {
    // 1단계: Index 먼저 (드롭다운에 필요)
    await loadIndexData();
    setLoadProgress(40); setLoadMsg(40);

    // 2단계: 상품 + 프로모션 동시 요청
    await Promise.all([
      loadProducts().then(() => { setLoadProgress(70); setLoadMsg(70); }),
      loadPromotions().then(() => { setLoadProgress(90); setLoadMsg(90); }),
    ]);
    setLoadProgress(100); setLoadMsg(100);
  } finally {
    setTimeout(() => showLoading(false), 300);
  }
}

async function refreshData() {
  await loadAll(); showToast('데이터를 새로고침했습니다.');
}

async function loadIndexData() {
  const res = await apiGet({ action: 'getIndex' });
  if (!res || !res.success) return;
  indexData.seasons = res.data.seasons || [];
  indexData.productCodes = res.data.productCodes || [];

  // 헤더 회차 드롭다운
  const sel = document.getElementById('seasonSelect');
  const cur = sel.value;
  sel.innerHTML = '<option value="">전체</option>';
  indexData.seasons.forEach(s => { const o = new Option(s,s); if(s===cur) o.selected=true; sel.appendChild(o); });
  document.getElementById('statSeasonCount').textContent = indexData.seasons.length;
  populateSeasonDropdowns();
  populateProductCodeDropdown();
}

function populateSeasonDropdowns() {
  ['productSeason','promoSeason'].forEach(id => {
    const sel = document.getElementById(id); const cur = sel.value;
    sel.innerHTML = '<option value="">선택하세요</option>';
    indexData.seasons.forEach(s => { const o = new Option(s,s); if(s===cur) o.selected=true; sel.appendChild(o); });
  });
}
function populateProductCodeDropdown() {
  const sel = document.getElementById('productCode'); const cur = sel.value;
  sel.innerHTML = '<option value="">선택하세요</option>';
  indexData.productCodes.forEach(p => {
    const label = p.name ? `${p.code} (${p.name})` : p.code;
    const o = new Option(label, p.code); if(p.code===cur) o.selected=true;
    sel.appendChild(o);
  });
}
function renderPromoCheckboxes(selectedCodes = []) {
  const checked = typeof selectedCodes==='string'
    ? selectedCodes.split(',').map(s=>s.trim()).filter(Boolean)
    : (Array.isArray(selectedCodes) ? selectedCodes : []);
  const c = document.getElementById('promoProductCodes');
  c.innerHTML = `<label><input type="checkbox" value="전체" ${checked.includes('전체')?'checked':''}><span>전체</span></label>`
    + indexData.productCodes.map(p =>
      `<label><input type="checkbox" value="${h(p.code)}" ${checked.includes(p.code)?'checked':''}><span>${h(p.code)}${p.name?` (${h(p.name)})`:''}  </span></label>`
    ).join('');
}
function getCheckedCodes() {
  return [...document.querySelectorAll('#promoProductCodes input[type="checkbox"]:checked')].map(el=>el.value);
}

async function loadProducts() {
  const season = document.getElementById('seasonSelect').value;
  const res = await apiGet({ action: 'getProducts', season });
  if (!res || !res.success) return;

  // ★ 회차 내림차순 정렬 (Index 탭 순서 기준, 없으면 알파벳 역순)
  const seasonOrder = indexData.seasons; // Index 탭 순서 그대로 사용
  allProducts = res.data.sort((a, b) => {
    const ia = seasonOrder.indexOf(a.Season);
    const ib = seasonOrder.indexOf(b.Season);
    // Index에 정의된 순서대로 (앞 = 최신이라고 가정)
    // 없는 경우 맨 뒤
    if (ia === -1 && ib === -1) return String(b.Season).localeCompare(String(a.Season));
    if (ia === -1) return 1;
    if (ib === -1) return -1;
    return ia - ib; // Index 탭 정의 순서 유지
  });

  rebuildCodeFilterChips();
  renderProductTable();
  document.getElementById('statProductCount').textContent = allProducts.length;
}

async function loadPromotions() {
  const season = document.getElementById('seasonSelect').value;
  const res = await apiGet({ action: 'getPromotions', season });
  if (!res || !res.success) return;
  promotions = res.data;
  renderCalendarEvents(); updatePromoStats();
}

// ══════════════════════════════════════════
// 상품코드 필터 칩
// ══════════════════════════════════════════
function rebuildCodeFilterChips() {
  const bar = document.getElementById('productCodeFilter');
  // 현재 데이터에 등장하는 상품코드만 (Index 순서 기준)
  const codesInData = [...new Set(allProducts.map(p => p.Product_Code))];
  const ordered = indexData.productCodes
    .filter(p => codesInData.includes(p.code))
    .map(p => p.code);
  // Index에 없는 코드 추가
  codesInData.forEach(c => { if (!ordered.includes(c)) ordered.push(c); });

  bar.innerHTML = `<span class="filter-chip filter-chip-all ${activeCodeFilter===''?'active':''}" data-code="" onclick="setCodeFilter(this)">전체</span>`
    + ordered.map(code => {
        const info = indexData.productCodes.find(p => p.code === code);
        const label = info && info.name ? `${code} (${info.name})` : code;
        return `<span class="filter-chip ${activeCodeFilter===code?'active':''}" data-code="${h(code)}" onclick="setCodeFilter(this)">${h(label)}</span>`;
      }).join('');
}

function setCodeFilter(el) {
  activeCodeFilter = el.dataset.code;
  document.querySelectorAll('#productCodeFilter .filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  renderProductTable();
}

// ══════════════════════════════════════════
// TABS
// ══════════════════════════════════════════
function switchTab(name, btn) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  btn.classList.add('active');
  if (name==='calendar' && calendar) setTimeout(() => calendar.render(), 50);
}

// ══════════════════════════════════════════
// OPTION BUILDER
// ══════════════════════════════════════════
function addOptionBlock(name='', items=[]) {
  optBlockSeq++;
  const bid = 'ob'+optBlockSeq;
  document.getElementById('optionBuilderEmpty').style.display = 'none';
  document.getElementById('optionColHint').style.display = '';
  const block = document.createElement('div');
  block.className = 'option-block'; block.id = bid;
  block.innerHTML = `
    <div class="option-block-header">
      <input class="option-name-input" placeholder="옵션명 (예: 용량, 색상, 사이즈)" value="${h(name)}">
      <button class="btn-icon" title="옵션 삭제" onclick="removeOptionBlock('${bid}')">✕</button>
    </div>
    <div class="option-items" id="${bid}_items"></div>
    <div style="padding:.3rem .75rem .5rem">
      <button class="btn-add-item" onclick="addOptionItem('${bid}_items')">＋ 항목 추가</button>
    </div>`;
  document.getElementById('optionBuilder').appendChild(block);
  if (items.length) items.forEach(it => {
    const val  = typeof it==='object' ? (it.val||'')  : String(it);
    const code = typeof it==='object' ? (it.code||'') : '';
    addOptionItem(bid+'_items', val, code);
  });
  else addOptionItem(bid+'_items');
}

function addOptionItem(cid, val='', code='') {
  const wrap = document.getElementById(cid);
  const row = document.createElement('div'); row.className = 'option-item';
  row.innerHTML = `
    <input class="option-item-val" placeholder="항목 값 (예: 딥데320, 블랙, S)" value="${h(val)}">
    <input class="option-item-code" placeholder="옵션코드" value="${h(code)}" title="옵션 코드 (선택)">
    <button class="btn-icon" onclick="this.parentElement.remove()">✕</button>`;
  wrap.appendChild(row);
  row.querySelector('.option-item-val').focus();
}

function removeOptionBlock(bid) {
  document.getElementById(bid).remove();
  if (!document.getElementById('optionBuilder').querySelector('.option-block')) {
    document.getElementById('optionBuilderEmpty').style.display = '';
    document.getElementById('optionColHint').style.display = 'none';
  }
}
function clearOptionBuilder() {
  document.getElementById('optionBuilder').innerHTML = '';
  document.getElementById('optionBuilderEmpty').style.display = '';
  document.getElementById('optionColHint').style.display = 'none';
}

// → JSON 직렬화
function serializeOptions() {
  const blocks = document.getElementById('optionBuilder').querySelectorAll('.option-block');
  if (!blocks.length) return '[]';
  const arr = [];
  blocks.forEach(bl => {
    const name = bl.querySelector('.option-name-input').value.trim();
    const items = [...bl.querySelectorAll('.option-item')].map(row => ({
      val:  (row.querySelector('.option-item-val')  || {}).value?.trim() || '',
      code: (row.querySelector('.option-item-code') || {}).value?.trim() || '',
    })).filter(it => it.val);
    if (name || items.length) arr.push({ name, items });
  });
  return JSON.stringify(arr);
}

// JSON → builder 복원
function deserializeOptions(optionsData) {
  clearOptionBuilder();
  let arr = [];
  if (!optionsData) return;
  if (typeof optionsData === 'string') {
    try { arr = JSON.parse(optionsData); } catch { return; }
  } else if (Array.isArray(optionsData)) {
    arr = optionsData;
  }
  if (!Array.isArray(arr)) return;
  arr.forEach(o => {
    const items = (o.items || []).map(it =>
      typeof it==='object' ? it : { val: String(it), code:'' }
    );
    addOptionBlock(o.name, items);
  });
}

// ── 테이블 인라인 옵션 렌더 ──
function renderOptionsInline(optionsData) {
  let arr = [];
  if (!optionsData) return '<span style="color:var(--text-muted);font-size:.78rem">-</span>';
  if (typeof optionsData === 'string') {
    try { arr = JSON.parse(optionsData); } catch {
      return `<span style="color:var(--text-muted);font-size:.75rem">${h(String(optionsData).substring(0,50))}</span>`;
    }
  } else if (Array.isArray(optionsData)) {
    arr = optionsData;
  }
  if (!Array.isArray(arr) || !arr.length) return '<span style="color:var(--text-muted);font-size:.78rem">-</span>';
  return arr.map(group => {
    const itemsHtml = (group.items || []).map(it => {
      const item = typeof it==='object' ? it : { val:String(it), code:'' };
      const codeTag = item.code ? `<span class="opt-chip-code">${h(item.code)}</span>` : '';
      return `<span class="opt-chip">${h(item.val)}${codeTag}</span>`;
    }).join('');
    const groupLabel = group.name
      ? `<div class="opt-group-name">${h(group.name)}</div>` : '';
    return `<div class="opt-group">${groupLabel}<div class="opt-items-row">${itemsHtml}</div></div>`;
  }).join('');
}

function h(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ══════════════════════════════════════════
// PRODUCT TABLE
// ══════════════════════════════════════════
function renderProductTable() {
  const tbody = document.getElementById('productTbody');

  // 상품코드 필터 적용
  const filtered = activeCodeFilter
    ? allProducts.filter(p => p.Product_Code === activeCodeFilter)
    : allProducts;

  if (!filtered.length) {
    tbody.innerHTML = '<tr><td colspan="5"><div class="empty-state"><div class="icon">📦</div>'
      + (activeCodeFilter ? `<b>${h(activeCodeFilter)}</b> 에 해당하는 상품이 없습니다` : '등록된 상품이 없습니다')
      + '</div></td></tr>';
    return;
  }

  tbody.innerHTML = filtered.map(p => `
    <tr>
      <td style="vertical-align:middle;white-space:nowrap"><span class="badge badge-teal">${h(p.Season)}</span></td>
      <td style="vertical-align:middle">
        <div><strong style="color:var(--accent2)">${h(p.Product_Code)}</strong></div>
        ${p.Product_Name ? `<div style="font-size:.78rem;color:var(--text-muted);margin-top:.15rem">${h(p.Product_Name)}</div>` : ''}
      </td>
      <td>${renderOptionsInline(p.options)}</td>
      <td style="vertical-align:middle;color:var(--text-muted);font-size:.75rem;white-space:nowrap">${h(p.Reg_Date||'-')}</td>
      <td style="vertical-align:middle">
        <div style="display:flex;gap:.35rem;flex-wrap:wrap">
          <button class="btn btn-secondary btn-sm" onclick="editProduct('${h(p.ID)}')">수정</button>
          <button class="btn btn-danger btn-sm" onclick="confirmDeleteProduct('${h(p.ID)}')">삭제</button>
        </div>
      </td>
    </tr>`).join('');
}

// ══════════════════════════════════════════
// PRODUCT CRUD
// ══════════════════════════════════════════
function openProductModal(product = null) {
  populateSeasonDropdowns(); populateProductCodeDropdown();
  document.getElementById('productModalTitle').textContent = product ? '상품 수정' : '신규 상품 등록';
  document.getElementById('productId').value = product ? product.ID : '';
  document.getElementById('productSeason').value = product ? product.Season : (document.getElementById('seasonSelect').value || '');
  document.getElementById('productCode').value = product ? product.Product_Code : '';
  document.getElementById('productName').value = product ? product.Product_Name : '';
  // options는 이제 배열 객체로 옴
  deserializeOptions(product ? product.options : null);
  openModal('productModal');
}
function editProduct(id) {
  const p = allProducts.find(x => x.ID === id);
  if (p) openProductModal(p);
}

async function saveProduct() {
  const id = document.getElementById('productId').value;
  const code = document.getElementById('productCode').value;
  const season = document.getElementById('productSeason').value;
  if (!season || !code) { showToast('회차와 상품코드는 필수입니다.', true); return; }
  let name = document.getElementById('productName').value.trim();
  if (!name) { const f = indexData.productCodes.find(p => p.code === code); if (f) name = f.name; }
  const payload = { id, season, productCode: code, productName: name, options: serializeOptions() };
  showLoading(true);
  const res = await apiPost({ action: id ? 'updateProduct' : 'createProduct', payload });
  showLoading(false);
  if (res && res.success) {
    showToast(res.message); closeModal('productModal'); await loadProducts();
  } else showToast(res ? res.message : '오류가 발생했습니다.', true);
}

async function confirmDeleteProduct(id) {
  if (!confirm('이 상품을 삭제하시겠습니까?')) return;
  showLoading(true);
  const res = await apiPost({ action: 'deleteProduct', payload: { id } });
  showLoading(false);
  if (res && res.success) { showToast(res.message); await loadProducts(); }
  else showToast(res ? res.message : '오류가 발생했습니다.', true);
}

function openPromoModal(promo = null) {
  populateSeasonDropdowns(); renderPromoCheckboxes(promo ? promo.Product_Code : []);
  document.getElementById('promoModalTitle').textContent = promo ? '프로모션 수정' : '프로모션 일정 등록';
  document.getElementById('promoId').value = promo ? promo.ID : '';
  document.getElementById('promoSeason').value = promo ? promo.Season : (document.getElementById('seasonSelect').value || '');
  document.getElementById('promoType').value = promo ? promo.Type : '내부광고';
  document.getElementById('promoTitle').value = promo ? promo.Title : '';
  document.getElementById('promoStartDate').value = promo ? promo.Start_Date : '';
  document.getElementById('promoEndDate').value = promo ? promo.End_Date : '';
  document.getElementById('promoMemo').value = promo ? promo.Memo : '';
  closeModal('promoDetailModal'); openModal('promoModal');
}

async function savePromotion() {
  const id = document.getElementById('promoId').value;
  const season = document.getElementById('promoSeason').value;
  const title = document.getElementById('promoTitle').value.trim();
  const start = document.getElementById('promoStartDate').value;
  const end   = document.getElementById('promoEndDate').value;
  if (!season||!title||!start||!end) { showToast('회차, 프로모션명, 시작일, 종료일은 필수입니다.', true); return; }
  if (end < start) { showToast('종료일이 시작일보다 이전일 수 없습니다.', true); return; }
  const payload = { id, season, title, type: document.getElementById('promoType').value, productCode: getCheckedCodes(), startDate: start, endDate: end, channel: '', memo: document.getElementById('promoMemo').value.trim() };
  showLoading(true);
  const res = await apiPost({ action: id ? 'updatePromotion' : 'createPromotion', payload });
  showLoading(false);
  if (res && res.success) { showToast(res.message); closeModal('promoModal'); await loadPromotions(); }
  else showToast(res ? res.message : '오류가 발생했습니다.', true);
}

async function deletePromotion(id) {
  if (!confirm('이 프로모션을 삭제하시겠습니까?')) return;
  showLoading(true);
  const res = await apiPost({ action: 'deletePromotion', payload: { id } });
  showLoading(false);
  if (res && res.success) { showToast(res.message); closeModal('promoDetailModal'); await loadPromotions(); }
  else showToast(res ? res.message : '오류가 발생했습니다.', true);
}
function editPromoFromDetail()   { if (selectedPromoForDetail) openPromoModal(selectedPromoForDetail); }
function deletePromoFromDetail() { if (selectedPromoForDetail) deletePromotion(selectedPromoForDetail.ID); }

// ══════════════════════════════════════════
// CALENDAR
// ══════════════════════════════════════════

// 표시 순서: 프로모션(0) → 내부광고(1) → 외부광고(2)
const TYPE_ORDER = { '프로모션':0, '내부광고':1, '내부':1, '외부광고':2, '외부':2 };
const TYPE_COLORS = {
  '내부광고':{ bg:'#4a90d9', bd:'#3a7ac9' },
  '외부광고':{ bg:'#9b59b6', bd:'#8a49a6' },
  '프로모션':{ bg:'#2ecc71', bd:'#27ae60' },
  '내부':    { bg:'#4a90d9', bd:'#3a7ac9' },
  '외부':    { bg:'#9b59b6', bd:'#8a49a6' },
};
const DEFAULT_COLOR = { bg:'#ff6b35', bd:'#ff5420' };

function initCalendar() {
  calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
    initialView: 'dayGridMonth',
    locale: 'ko',
    height: 'auto',
    dayMaxEvents: true,
    // ★ eventOrder: extendedProps.typeOrder 기준 정렬 (함수로 지정해야 안전)
    eventOrder: (a, b) => {
      const oa = (a.extendedProps?.typeOrder ?? 9);
      const ob = (b.extendedProps?.typeOrder ?? 9);
      return oa !== ob ? oa - ob : (a.title || '').localeCompare(b.title || '');
    },
    headerToolbar: { left:'prev,next today', center:'title', right:'dayGridMonth,timeGridWeek,listMonth' },
    buttonText: { today:'오늘', month:'월', week:'주', list:'목록' },
    eventClick(info) {
      // ★ ID 조회 없이 extendedProps에 저장된 원본 데이터 직접 사용
      const p = info.event.extendedProps.promoData;
      if (p) showPromoDetail(p);
    },
    dateClick(info) {
      document.getElementById('promoStartDate').value = info.dateStr;
      document.getElementById('promoEndDate').value   = info.dateStr;
      openPromoModal();
    },
    eventDidMount(info) {
      info.el.title = info.event.title;
    }
  });
  calendar.render();
}

function renderCalendarEvents() {
  if (!calendar) return;
  calendar.removeAllEvents();

  const sorted = [...promotions].sort((a, b) => {
    const oa = TYPE_ORDER[a.Type] ?? 9;
    const ob = TYPE_ORDER[b.Type] ?? 9;
    return oa !== ob ? oa - ob : (a.Title || '').localeCompare(b.Title || '');
  });

  sorted.forEach(p => {
    const c = TYPE_COLORS[p.Type] || DEFAULT_COLOR;

    // ★ 종료일 버그 수정
    // GAS에서 'yyyy-MM-dd' 문자열로 오므로 파싱 시 타임존 문제 없이 처리
    // FullCalendar end는 exclusive → DB 종료일 그대로 +1일만 하면 됨
    let endStr = p.Start_Date; // 기본값: 시작일과 같음 (하루짜리)
    if (p.End_Date) {
      // 'yyyy-MM-dd' 분해 → 타임존 영향 없는 로컬 Date 생성
      const [y, m, d] = p.End_Date.split('-').map(Number);
      const endLocal = new Date(y, m - 1, d);
      endLocal.setDate(endLocal.getDate() + 1); // +1 (exclusive)
      endStr = `${endLocal.getFullYear()}-${String(endLocal.getMonth()+1).padStart(2,'0')}-${String(endLocal.getDate()).padStart(2,'0')}`;
    }

    calendar.addEvent({
      id:              String(p.ID),
      title:           p.Title,
      start:           p.Start_Date,
      end:             endStr,
      backgroundColor: c.bg,
      borderColor:     c.bd,
      extendedProps:   {
        typeOrder: TYPE_ORDER[p.Type] ?? 9,
        promoData: p   // ★ 원본 데이터 통째로 저장
      }
    });
  });
}
function updatePromoStats() {
  document.getElementById('statPromoCount').textContent = promotions.length;
  document.getElementById('statInternalCount').textContent = promotions.filter(p=>p.Type==='내부광고'||p.Type==='내부').length;
  document.getElementById('statExternalCount').textContent = promotions.filter(p=>p.Type==='외부광고'||p.Type==='외부').length;
  document.getElementById('statPromoOnlyCount').textContent = promotions.filter(p=>p.Type==='프로모션').length;
}

// ══════════════════════════════════════════
// PROMO DETAIL
// ══════════════════════════════════════════
function typeBadgeClass(t) {
  if(t==='내부광고'||t==='내부') return 'badge-internal';
  if(t==='외부광고'||t==='외부') return 'badge-external';
  if(t==='프로모션') return 'badge-promo';
  return 'badge-teal';
}
function showPromoDetail(promo) {
  selectedPromoForDetail = promo;
  document.getElementById('promoDetailTitle').textContent = promo.Title;
  const codeDisplay = (promo.Product_Code||'').split(',').map(c => {
    c = c.trim(); if(!c) return null;
    const f = indexData.productCodes.find(p=>p.code===c);
    return f ? `${h(c)} (${h(f.name)})` : h(c);
  }).filter(Boolean).join(', ') || '-';
  document.getElementById('promoDetailBody').innerHTML = `
    <div style="display:grid;gap:.85rem">
      <div style="display:flex;gap:.5rem;flex-wrap:wrap">
        <span class="badge ${typeBadgeClass(promo.Type)}">${h(promo.Type)}</span>
        <span class="badge badge-teal">${h(promo.Season)}</span>
      </div>
      ${dRow('기간', `${h(promo.Start_Date)} ~ ${h(promo.End_Date)}`)}
      ${dRow('상품코드', codeDisplay)}
      ${promo.Memo ? dRow('메모', h(promo.Memo)) : ''}
      <div style="font-size:.72rem;color:var(--text-muted);font-family:'Space Mono',monospace">ID: ${h(promo.ID)}</div>
    </div>`;
  openModal('promoDetailModal');
}
function dRow(label, val) {
  return `<div><div style="font-size:.72rem;color:var(--text-muted);letter-spacing:.06em;text-transform:uppercase;margin-bottom:.25rem;font-family:'Space Mono',monospace">${label}</div><div style="font-size:.85rem">${val}</div></div>`;
}

// ══════════════════════════════════════════
// MODAL HELPERS
// ══════════════════════════════════════════
function openModal(id)  { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.modal-backdrop').forEach(b =>
  b.addEventListener('click', e => { if(e.target===b) b.classList.remove('open'); })
);

// ══════════════════════════════════════════
// LOADING & TOAST
// ══════════════════════════════════════════
function showLoading(v) {
  document.getElementById('loadingOverlay').classList.toggle('show', v);
  if (v) { setLoadProgress(0); }
}
let _toast;
function showToast(msg, err=false) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'show'+(err?' error':'');
  clearTimeout(_toast); _toast = setTimeout(()=>{ t.className=''; }, 3000);
}
</script>
